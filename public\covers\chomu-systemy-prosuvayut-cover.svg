<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Система обирає передбачуваних</title>
  <desc id="desc">Editorial poster cover for Тіньова карта with a large system symbol, muted warm background, burgundy accent, and minimal influence-map texture.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f1e8"/>
      <stop offset="0.58" stop-color="#eadfce"/>
      <stop offset="1" stop-color="#d8c8b4"/>
    </linearGradient>
    <radialGradient id="shadow" cx="66%" cy="44%" r="58%">
      <stop offset="0" stop-color="#181614" stop-opacity="0.26"/>
      <stop offset="0.52" stop-color="#181614" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#181614" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92 0H0V92" fill="none" stroke="#181614" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#181614" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#shadow)"/>

  <g fill="none" stroke="#181614" stroke-linecap="round" stroke-linejoin="round">
    <path d="M915 188 1102 318 1264 248" stroke-opacity="0.2" stroke-width="4"/>
    <path d="M1102 318 1012 520 1216 634" stroke-opacity="0.2" stroke-width="4"/>
    <path d="M1012 520 820 398 915 188" stroke-opacity="0.16" stroke-width="4"/>
    <path d="M1264 248 1216 634" stroke-opacity="0.12" stroke-width="3"/>
  </g>

  <g fill="#181614" fill-opacity="0.34">
    <circle cx="915" cy="188" r="13"/>
    <circle cx="1102" cy="318" r="16"/>
    <circle cx="1264" cy="248" r="12"/>
    <circle cx="1012" cy="520" r="15"/>
    <circle cx="1216" cy="634" r="13"/>
    <circle cx="820" cy="398" r="11"/>
  </g>

  <g filter="url(#soft)">
    <circle cx="1082" cy="430" r="205" fill="#181614" fill-opacity="0.88"/>
    <circle cx="1082" cy="430" r="132" fill="none" stroke="#f6f1e8" stroke-opacity="0.3" stroke-width="7"/>
    <path d="M1082 232v396M884 430h396M944 294l272 272M1216 294 944 566" stroke="#7f1d2d" stroke-width="18" stroke-linecap="round" stroke-opacity="0.95"/>
    <circle cx="1082" cy="430" r="42" fill="#7f1d2d"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" fill="#181614">
    <text x="96" y="116" font-size="22" font-weight="800" letter-spacing="7" fill-opacity="0.58">ТІНЬОВА КАРТА</text>
    <text x="96" y="310" font-size="112" font-weight="900" letter-spacing="0">СИСТЕМА</text>
    <text x="96" y="432" font-size="112" font-weight="900" letter-spacing="0">ОБИРАЄ</text>
    <text x="96" y="554" font-size="112" font-weight="900" letter-spacing="0" fill="#7f1d2d">ПЕРЕДБАЧУВАНИХ</text>
    <text x="102" y="650" font-size="30" font-weight="650" fill-opacity="0.68">досьє про статус, владу і соціальні ліфти</text>
  </g>

  <path d="M96 730h450" stroke="#7f1d2d" stroke-width="8" stroke-linecap="round"/>
  <path d="M96 768h260" stroke="#181614" stroke-width="3" stroke-opacity="0.24" stroke-linecap="round"/>
</svg>
