<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f7efe4"/>

  <!-- Film frame corners — cinematic feel -->
  <rect x="80" y="60" width="1040" height="460" rx="2" fill="none" stroke="#211917" stroke-width="1.5" opacity="0.2"/>
  <!-- Corner marks -->
  <path d="M 80 60 L 80 110 M 80 60 L 130 60" stroke="#211917" stroke-width="2.5" opacity="0.4"/>
  <path d="M 1120 60 L 1120 110 M 1120 60 L 1070 60" stroke="#211917" stroke-width="2.5" opacity="0.4"/>
  <path d="M 80 520 L 80 470 M 80 520 L 130 520" stroke="#211917" stroke-width="2.5" opacity="0.4"/>
  <path d="M 1120 520 L 1120 470 M 1120 520 L 1070 520" stroke="#211917" stroke-width="2.5" opacity="0.4"/>

  <!-- Scene: two figures — one waiting, one absent -->
  <!-- Waiting figure (her) — left, present, lit -->
  <ellipse cx="380" cy="240" rx="36" ry="44" fill="#8f1f2e" opacity="0.25"/>
  <path d="M 320 400 Q 322 285 380 268 Q 438 285 440 400" fill="#8f1f2e" opacity="0.2"/>

  <!-- Phone in her hand -->
  <rect x="355" y="285" width="22" height="38" rx="4" fill="none" stroke="#8f1f2e" stroke-width="2" opacity="0.6"/>
  <rect x="359" y="290" width="14" height="22" rx="1" fill="#8f1f2e" opacity="0.15"/>

  <!-- 3-day gap — timeline -->
  <line x1="460" y1="290" x2="740" y2="290" stroke="#211917" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.35"/>
  <!-- Day markers -->
  <text x="510" y="280" font-family="Georgia, serif" font-size="14" fill="#8f1f2e" opacity="0.5" text-anchor="middle">день 1</text>
  <text x="600" y="280" font-family="Georgia, serif" font-size="14" fill="#8f1f2e" opacity="0.5" text-anchor="middle">день 2</text>
  <text x="690" y="280" font-family="Georgia, serif" font-size="14" fill="#8f1f2e" opacity="0.5" text-anchor="middle">день 3</text>
  <circle cx="510" cy="290" r="4" fill="#8f1f2e" opacity="0.35"/>
  <circle cx="600" cy="290" r="4" fill="#8f1f2e" opacity="0.35"/>
  <circle cx="690" cy="290" r="6" fill="#8f1f2e" opacity="0.6"/>

  <!-- His figure (him) — right, faint, barely there -->
  <ellipse cx="850" cy="240" rx="36" ry="44" fill="none" stroke="#211917" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,4"/>
  <path d="M 790 400 Q 792 285 850 268 Q 908 285 910 400" fill="none" stroke="#211917" stroke-width="1.5" opacity="0.15" stroke-dasharray="5,5"/>

  <!-- Title -->
  <text x="600" y="488" font-family="Georgia, serif" font-size="24" fill="#211917" text-anchor="middle" font-style="italic">Чоловік, який відповідав</text>
  <text x="600" y="524" font-family="Georgia, serif" font-size="22" fill="#8f1f2e" text-anchor="middle">через три дні</text>

  <line x1="200" y1="550" x2="1000" y2="550" stroke="#8f1f2e" stroke-width="1" opacity="0.4"/>
  <text x="600" y="573" font-family="Georgia, serif" font-size="13" fill="#8f1f2e" text-anchor="middle" opacity="0.6" letter-spacing="3">ЛЮДСЬКИЙ СЦЕНАРІЙ · ЛЮДСЬКИЙ МЕХАНІЗМ</text>
</svg>
