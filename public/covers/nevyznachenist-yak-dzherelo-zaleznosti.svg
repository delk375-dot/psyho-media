<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f7efe4"/>

  <!-- Pendulum arc — uncertainty -->
  <path d="M 600 80 Q 780 200 760 380" stroke="#8f1f2e" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.5"/>
  <path d="M 600 80 Q 420 200 440 380" stroke="#8f1f2e" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.5"/>
  <path d="M 600 80 Q 700 200 680 380" stroke="#211917" stroke-width="1.5" fill="none" stroke-dasharray="4,6" opacity="0.3"/>
  <path d="M 600 80 Q 500 200 520 380" stroke="#211917" stroke-width="1.5" fill="none" stroke-dasharray="4,6" opacity="0.3"/>

  <!-- Pivot point -->
  <circle cx="600" cy="80" r="6" fill="#8f1f2e"/>

  <!-- Pendulum bob — current state (uncertain position) -->
  <circle cx="600" cy="400" r="28" fill="none" stroke="#8f1f2e" stroke-width="2.5" stroke-dasharray="8,5"/>
  <circle cx="600" cy="400" r="10" fill="#8f1f2e" opacity="0.4"/>

  <!-- Ghost positions -->
  <circle cx="756" cy="378" r="18" fill="none" stroke="#8f1f2e" stroke-width="1.5" opacity="0.3"/>
  <circle cx="444" cy="378" r="18" fill="none" stroke="#8f1f2e" stroke-width="1.5" opacity="0.3"/>

  <!-- Thread -->
  <line x1="600" y1="80" x2="600" y2="372" stroke="#211917" stroke-width="2"/>

  <!-- Question marks flanking -->
  <text x="300" y="260" font-family="Georgia, serif" font-size="72" fill="#8f1f2e" opacity="0.12" text-anchor="middle">?</text>
  <text x="900" y="260" font-family="Georgia, serif" font-size="72" fill="#8f1f2e" opacity="0.12" text-anchor="middle">?</text>

  <!-- Title -->
  <text x="600" y="510" font-family="Georgia, serif" font-size="28" fill="#211917" text-anchor="middle" font-style="italic">Невизначеність</text>
  <text x="600" y="548" font-family="Georgia, serif" font-size="22" fill="#8f1f2e" text-anchor="middle">як джерело залежності</text>

  <!-- Thin bottom rule -->
  <line x1="200" y1="575" x2="1000" y2="575" stroke="#8f1f2e" stroke-width="1" opacity="0.4"/>
  <text x="600" y="598" font-family="Georgia, serif" font-size="14" fill="#8f1f2e" text-anchor="middle" opacity="0.7" letter-spacing="3">ЛЮДСЬКИЙ МЕХАНІЗМ</text>
</svg>
