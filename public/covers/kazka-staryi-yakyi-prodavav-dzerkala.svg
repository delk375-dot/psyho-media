<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f7efe4"/>

  <!-- Warm amber background wash — fairytale warmth -->
  <ellipse cx="600" cy="315" rx="420" ry="260" fill="#8f1f2e" opacity="0.05"/>

  <!-- Ornate mirror frame -->
  <ellipse cx="600" cy="270" rx="130" ry="160" fill="none" stroke="#8f1f2e" stroke-width="3"/>
  <!-- Frame ornament top -->
  <path d="M 560 115 Q 600 90 640 115" stroke="#8f1f2e" stroke-width="2" fill="none"/>
  <circle cx="600" cy="108" r="7" fill="#8f1f2e" opacity="0.6"/>
  <!-- Frame ornament sides -->
  <path d="M 468 200 Q 450 270 468 340" stroke="#8f1f2e" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 732 200 Q 750 270 732 340" stroke="#8f1f2e" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Frame ornament bottom -->
  <path d="M 560 428 Q 600 450 640 428" stroke="#8f1f2e" stroke-width="2" fill="none"/>

  <!-- Mirror surface — shows inner truth, not face -->
  <ellipse cx="600" cy="270" rx="118" ry="147" fill="#8f1f2e" opacity="0.08"/>

  <!-- Reflection: ripple / truth pattern inside mirror -->
  <ellipse cx="600" cy="270" rx="60" ry="75" fill="none" stroke="#8f1f2e" stroke-width="1" opacity="0.3"/>
  <ellipse cx="600" cy="270" rx="35" ry="44" fill="none" stroke="#8f1f2e" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="600" cy="270" rx="14" ry="17" fill="#8f1f2e" opacity="0.3"/>

  <!-- Glare lines on mirror surface -->
  <path d="M 510 185 Q 525 200 515 220" stroke="#f7efe4" stroke-width="6" opacity="0.5" stroke-linecap="round" fill="none"/>
  <path d="M 520 175 Q 530 182 525 195" stroke="#f7efe4" stroke-width="3" opacity="0.4" stroke-linecap="round" fill="none"/>

  <!-- Faint silhouettes of three characters outside frame -->
  <!-- Left figure (woman who broke) -->
  <ellipse cx="310" cy="230" rx="18" ry="22" fill="none" stroke="#8f1f2e" stroke-width="1.5" opacity="0.25"/>
  <path d="M 280 310 Q 282 265 310 255 Q 338 265 340 310" fill="none" stroke="#8f1f2e" stroke-width="1.5" opacity="0.2"/>
  <!-- Right figure (man who covered) -->
  <ellipse cx="890" cy="230" rx="18" ry="22" fill="none" stroke="#8f1f2e" stroke-width="1.5" opacity="0.25"/>
  <path d="M 860 310 Q 862 265 890 255 Q 918 265 920 310" fill="none" stroke="#8f1f2e" stroke-width="1.5" opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="500" font-family="Georgia, serif" font-size="26" fill="#211917" text-anchor="middle" font-style="italic">Старий, який продавав</text>
  <text x="600" y="536" font-family="Georgia, serif" font-size="22" fill="#8f1f2e" text-anchor="middle">людям дзеркала</text>

  <line x1="200" y1="563" x2="1000" y2="563" stroke="#8f1f2e" stroke-width="1" opacity="0.4"/>
  <text x="600" y="586" font-family="Georgia, serif" font-size="13" fill="#8f1f2e" text-anchor="middle" opacity="0.6" letter-spacing="3">ПСИХОЛОГІЧНА КАЗКА · ЛЮДСЬКИЙ МЕХАНІЗМ</text>
</svg>
