name: Import Human Mechanism

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/import-human-mechanism.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout psyho-media
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prepared project
        run: |
          python3 - <<'PY'
          import pathlib
          import urllib.request
          import zipfile
          url = "https://files.catbox.moe/ll9z5s.zip"
          target = pathlib.Path(__import__('os').environ['RUNNER_TEMP']) / 'project.zip'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=60) as response:
              data = response.read()
          target.write_bytes(data)
          print(f"downloaded={len(data)}")
          if len(data) < 1000000:
              raise SystemExit('Downloaded artifact is too small')
          with zipfile.ZipFile(target) as archive:
              bad = archive.testzip()
              if bad:
                  raise SystemExit(f'Bad zip member: {bad}')
              archive.extractall(pathlib.Path(__import__('os').environ['RUNNER_TEMP']) / 'project')
          PY

      - name: Replace repository contents except workflow files
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import shutil
          root = pathlib.Path.cwd()
          runner_temp = pathlib.Path(os.environ['RUNNER_TEMP'])
          project = runner_temp / 'project'
          keep = runner_temp / 'workflows-keep'
          workflows = root / '.github' / 'workflows'
          if workflows.exists():
              shutil.copytree(workflows, keep / 'workflows', dirs_exist_ok=True)
          for child in list(root.iterdir()):
              if child.name == '.git':
                  continue
              if child.is_dir():
                  shutil.rmtree(child)
              else:
                  child.unlink()
          for child in project.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target, dirs_exist_ok=True)
              else:
                  shutil.copy2(child, target)
          source_workflows = root / '.github' / 'workflows'
          if source_workflows.exists():
              shutil.rmtree(source_workflows)
          (root / '.github').mkdir(exist_ok=True)
          if (keep / 'workflows').exists():
              shutil.copytree(keep / 'workflows', source_workflows, dirs_exist_ok=True)
          required = [
              root / 'package.json',
              root / 'src',
              root / 'public',
              root / 'public' / 'default-og.svg',
              root / 'public' / 'covers' / 'ghosting-cover.svg',
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit('Missing after import: ' + ', '.join(missing))
          PY

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Commit imported project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No imported changes staged"; exit 1; }
          git commit -m "Rebuild site as Human Mechanism media"
          git push origin main
