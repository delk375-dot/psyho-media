name: Import Human Mechanism

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/import-human-mechanism.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout psyho-media
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prepared project
        run: |
          python3 - <<'PY'
          import pathlib
          import urllib.request
          import zipfile
          url = "https://files.catbox.moe/ll9z5s.zip"
          target = pathlib.Path(__import__('os').environ['RUNNER_TEMP']) / 'project.zip'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=60) as response:
              data = response.read()
          target.write_bytes(data)
          print(f"downloaded={len(data)}")
          if len(data) < 1000000:
              raise SystemExit('Downloaded artifact is too small')
          with zipfile.ZipFile(target) as archive:
              bad = archive.testzip()
              if bad:
                  raise SystemExit(f'Bad zip member: {bad}')
              archive.extractall(pathlib.Path(__import__('os').environ['RUNNER_TEMP']) / 'project')
          PY

      - name: Replace repository contents except workflow files
        run: |
          mkdir -p "$RUNNER_TEMP/workflows-keep"
          cp -a .github/workflows "$RUNNER_TEMP/workflows-keep/"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$RUNNER_TEMP/project/." .
          rm -rf .github/workflows
          mkdir -p .github
          cp -a "$RUNNER_TEMP/workflows-keep/workflows" .github/
          test -f package.json
          test -d src
          test -d public
          test -f public/default-og.svg
          test -f public/covers/ghosting-cover.svg

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Commit imported project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No imported changes staged"; exit 1; }
          git commit -m "Rebuild site as Human Mechanism media"
          git push origin main
