name: Import Human Mechanism

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/import-human-mechanism.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout psyho-media
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prepared project
        run: |
          python3 - <<'PY'
          import pathlib
          import urllib.request
          import zipfile
          url = "https://files.catbox.moe/ll9z5s.zip"
          target = pathlib.Path(__import__('os').environ['RUNNER_TEMP']) / 'project.zip'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=60) as response:
              data = response.read()
          target.write_bytes(data)
          if len(data) < 1000000:
              raise SystemExit('Downloaded artifact is too small')
          with zipfile.ZipFile(target) as archive:
              bad = archive.testzip()
              if bad:
                  raise SystemExit(f'Bad zip member: {bad}')
              archive.extractall(pathlib.Path(__import__('os').environ['RUNNER_TEMP']) / 'project')
          PY

      - name: Replace site contents
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import shutil
          import traceback
          root = pathlib.Path.cwd()
          project = pathlib.Path(os.environ['RUNNER_TEMP']) / 'project'
          try:
              for child in list(root.iterdir()):
                  if child.name in {'.git', '.github'}:
                      continue
                  if child.is_dir():
                      shutil.rmtree(child)
                  else:
                      child.unlink()
              for child in project.iterdir():
                  if child.name == '.github':
                      continue
                  target = root / child.name
                  if child.is_dir():
                      shutil.copytree(child, target, dirs_exist_ok=True)
                  else:
                      shutil.copy2(child, target)
              required = [root / 'package.json', root / 'src', root / 'public', root / 'public' / 'default-og.svg', root / 'public' / 'covers' / 'ghosting-cover.svg']
              missing = [str(path) for path in required if not path.exists()]
              if missing:
                  raise RuntimeError('Missing after import: ' + ', '.join(missing))
              (root / 'import-error.txt').write_text('replace-ok\n', encoding='utf-8')
          except Exception:
              (root / 'import-error.txt').write_text(traceback.format_exc(), encoding='utf-8')
          PY

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build > build-log.txt 2>&1 || true

      - name: Commit imported project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No imported changes staged"; exit 1; }
          git commit -m "Diagnose Human Mechanism build"
          git push origin main
