name: Scheduled rebuild

on:
  schedule:
    - cron: "5 6 * * *"
    - cron: "5 11 * * *"
    - cron: "5 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger-rebuild:
    name: Trigger scheduled Cloudflare Pages rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Cloudflare Pages Deploy Hook
        if: env.CLOUDFLARE_DEPLOY_HOOK_URL != ''
        run: curl --fail --silent --show-error --request POST "$CLOUDFLARE_DEPLOY_HOOK_URL"

      - name: Checkout repository
        if: env.CLOUDFLARE_DEPLOY_HOOK_URL == ''
        uses: actions/checkout@v4

      - name: Trigger rebuild with empty commit
        if: env.CLOUDFLARE_DEPLOY_HOOK_URL == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Trigger scheduled Cloudflare Pages rebuild"
          git push
