name: Import scheduled rebuild

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/import-scheduled-rebuild.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download project archive
        run: curl --fail --location --output project.tar.gz "https://files.catbox.moe/zqoopt.gz"

      - name: Replace repository files
        run: |
          mkdir incoming
          tar -xzf project.tar.gz -C incoming
          rsync -a --delete --exclude='.git' incoming/ ./

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify scheduled rebuild workflow
        run: |
          test -f .github/workflows/scheduled-rebuild.yml
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/scheduled-rebuild.yml"); puts "YAML syntax ok"'
          grep -q 'workflow_dispatch:' .github/workflows/scheduled-rebuild.yml
          grep -q 'cron: "5 6 \* \* \*"' .github/workflows/scheduled-rebuild.yml
          grep -q 'cron: "5 11 \* \* \*"' .github/workflows/scheduled-rebuild.yml
          grep -q 'cron: "5 16 \* \* \*"' .github/workflows/scheduled-rebuild.yml
          grep -q 'CLOUDFLARE_DEPLOY_HOOK_URL' .github/workflows/scheduled-rebuild.yml
          ! grep -Eq 'echo .*CLOUDFLARE_DEPLOY_HOOK_URL|echo .*\$CLOUDFLARE_DEPLOY_HOOK_URL' .github/workflows/scheduled-rebuild.yml

      - name: Build project
        run: pnpm run build

      - name: Commit imported project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Add scheduled rebuild workflow"
          git push
