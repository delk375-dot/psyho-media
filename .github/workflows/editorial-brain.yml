name: Editorial Brain Weekly Digest

on:
  schedule:
    # Every Sunday at 06:00 UTC = 09:00 Europe/Kyiv (UTC+3 summer)
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  editorial-audit:
    name: Run Editorial Brain Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: "11.5.2"

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: "📦 Install dependencies"
        run: pnpm install --frozen-lockfile

      - name: "🧠 Run Editorial Brain Audit"
        run: pnpm editorial:audit
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          EDITORIAL_TELEGRAM_CHAT_ID: ${{ secrets.EDITORIAL_TELEGRAM_CHAT_ID }}

      - name: "💾 Commit updated audit files"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/editorial-audit.md data/editorial-audit.json

          if git diff --cached --quiet; then
            echo "No audit files changed — nothing to commit."
          else
            git commit -m "chore: update editorial brain report [skip ci]"
            git push origin main
            echo "✅ Editorial report committed and pushed."
          fi
