name: Copy leader-blog

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/copy-leader-blog.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  copy-build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout psyho-media
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone leader-blog
        run: git clone --depth 1 https://github.com/delk375-dot/leader-blog.git "$RUNNER_TEMP/leader-blog"

      - name: Replace repository contents
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$RUNNER_TEMP/leader-blog/." .
          rm -rf .git/modules

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Commit copied project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Copy AstroPaper project from leader-blog" || exit 0
          git push origin main
