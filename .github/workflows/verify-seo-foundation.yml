name: Verify SEO foundation

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/verify-seo-foundation.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download project archive
        run: curl --fail --location --output "$RUNNER_TEMP/project.tar.gz" "https://files.catbox.moe/zu9s33.gz"

      - name: Replace repository files
        run: |
          mkdir "$RUNNER_TEMP/incoming"
          tar -xzf "$RUNNER_TEMP/project.tar.gz" -C "$RUNNER_TEMP/incoming"
          rsync -a --delete --exclude='.git' "$RUNNER_TEMP/incoming/" ./

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Verify SEO output
        run: |
          grep -R "https://psyho-media.pp.ua" dist/index.html dist/rss.xml dist/sitemap-index.xml dist/robots.txt
          ! grep -R "psyho-media.pages.dev" dist/index.html dist/rss.xml dist/sitemap-index.xml dist/robots.txt
          grep -q "Sitemap: https://psyho-media.pp.ua/sitemap-index.xml" dist/robots.txt
          grep -q "https://psyho-media.pp.ua" dist/sitemap-index.xml
          ! grep -R "chomu-lyudy-povertayutsya-pislya-rozryvu" dist/sitemap* dist/rss.xml
          ! grep -R "emotsiyna-zalezhnist-chomu-lyudy-trymayutsya-za-tykh-khto-robyt-bolyache" dist/sitemap* dist/rss.xml

# trigger: seo-foundation-v2
