name: Import cover system

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/import-cover-system.yml

permissions:
  contents: write

jobs:
  import-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prepared project archive
        run: |
          curl -fsSL "https://files.catbox.moe/o3nd7o.gz" -o "$RUNNER_TEMP/cover-system.tar.gz"
          mkdir -p "$RUNNER_TEMP/incoming"
          tar -xzf "$RUNNER_TEMP/cover-system.tar.gz" -C "$RUNNER_TEMP/incoming"

      - name: Import files
        run: |
          rsync -a --delete --exclude='.git' --exclude='.github' "$RUNNER_TEMP/incoming/" ./

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify cover system files
        run: |
          test -f src/utils/generatePostCover.ts
          test -f docs/cover-system.md
          grep -q 'cover: z.string().optional()' src/content.config.ts
          grep -q 'getGeneratedPostCoverPath' src/components/Card.astro
          grep -q 'getGeneratedPostCoverPath' 'src/pages/posts/[...slug]/index.astro'
          grep -q '^cover: "/covers/chomu-lyudy-znykayut-bez-poyasnennya.svg"' src/content/posts/chomu-lyudy-znykayut-bez-poyasnennya.md
          test -f public/covers/chomu-lyudy-znykayut-bez-poyasnennya.svg
          grep -q 'y="278"' public/covers/chomu-lyudy-znykayut-bez-poyasnennya.svg
          ! grep -q 'y="0"' public/covers/chomu-lyudy-znykayut-bez-poyasnennya.svg
          ! grep -q '^cover:' src/content/posts/_scheduled-post-example.md

      - name: Build
        run: pnpm build

      - name: Commit imported changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add .
          git commit -m "Add automatic SVG cover system"
          git push
