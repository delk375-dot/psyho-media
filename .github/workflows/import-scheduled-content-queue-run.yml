name: Import scheduled content queue run

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/import-scheduled-content-queue-run.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download project archive
        run: curl --fail --location --output "$RUNNER_TEMP/project.tar.gz" "https://files.catbox.moe/82wncp.gz"

      - name: Replace repository files
        run: |
          mkdir "$RUNNER_TEMP/incoming"
          tar -xzf "$RUNNER_TEMP/project.tar.gz" -C "$RUNNER_TEMP/incoming"
          rsync -a --delete --exclude='.git' --exclude='.github' "$RUNNER_TEMP/incoming/" ./

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.3.0"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify scheduled content queue
        run: |
          files=(
            fragment-pryvyazuyutsya-do-nestachi-vidpovidi.md
            chomu-nevyznachenist-vyklykaye-sylnishi-emotsiyi.md
            chomu-lyudy-tsinuyut-pislya-vtraty.md
            fragment-sumuye-za-vlasnoyu-znachushchistyu.md
            chomu-lyudy-povertayutsya-pislya-rozryvu.md
            chomu-tyagne-do-tykh-khto-ne-daye-yasnosti.md
            fragment-movchannya-vyhlyadaye-hlybshym.md
            chomu-kholodnist-spryymayetsya-yak-syla.md
            emotsiyna-zalezhnist-chomu-lyudy-trymayutsya-za-tykh-khto-robyt-bolyache.md
          )
          for file in "${files[@]}"; do
            test -f "src/content/posts/$file"
            ! grep -q 'draft: true' "src/content/posts/$file"
            grep -Eq 'pubDatetime: 2026-06-(08|09|10)T(09|14|19):00:00\+03:00' "src/content/posts/$file"
            cover=$(grep '^ogImage: /covers/' "src/content/posts/$file" | sed 's#ogImage: /##')
            test -f "$cover"
          done
          grep -q 'contentType: pillar_article' src/content/posts/emotsiyna-zalezhnist-chomu-lyudy-trymayutsya-za-tykh-khto-robyt-bolyache.md

      - name: Build project
        run: pnpm run build

      - name: Commit imported project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Create scheduled content queue"
          git push
